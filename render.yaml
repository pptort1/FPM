services:
  - type: web
    name: fpm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fpm-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://fpm-frontend.onrender.com

  - type: web
    name: fpm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fpm-db
    databaseName: fpm
    plan: free
